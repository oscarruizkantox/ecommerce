volumes:
  postgres_data:
  redis_data:

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: cqrs-es-sample-with-res_development
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgres://postgres:secret@postgres/cqrs-es-sample-with-res_development
      REDIS_URL: redis://redis:6379/0
      RAILS_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./infra:/app/infra
      - ./domains:/app/domains
      - ./apps/rails_application:/app/apps/rails_application
    command: ["sh", "-c", "bin/rails tailwindcss:build && bundle exec puma -C config/puma.rb"]
    stdin_open: true
    tty: true

  test:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:secret@postgres/cqrs-es-sample-with-res_test
      REDIS_URL: redis://redis:6379/1
      RAILS_ENV: test
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./infra:/app/infra
      - ./domains:/app/domains
      - ./apps/rails_application:/app/apps/rails_application
    command: ["bin/rails", "test"]
    profiles:
      - test
